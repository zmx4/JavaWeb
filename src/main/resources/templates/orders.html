<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单</title>
    <link rel="stylesheet" th:href="@{/css/orders.css}">
</head>
<body>
    <div class="navbar">
        <h1>我的订单</h1>
        <div class="navbar-links">
            <a th:href="@{/home}">首页</a>
            <a th:href="@{/products}">浏览商品</a>
            <a th:href="@{/cart}">购物车</a>
        </div>
    </div>

    <div class="orders-container">
        <div class="page-loading" id="pageLoading">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>

        <div id="ordersList"></div>

        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">📋</div>
            <p>暂无订单记录</p>
            <a th:href="@{/products}">去购物</a>
        </div>
    </div>

    <script th:src="@{/js/jquery-4.0.0.min.js}"></script>
    <script>
        $(function () {

            var statusText = { PENDING: '待支付', PAID: '已支付', CANCELLED: '已取消' };

            function loadOrders() {
                $.ajax({
                    url: '/api/orders',
                    method: 'GET',
                    dataType: 'json',
                    success: function (data) {
                        $('#pageLoading').hide();
                        if (!data || data.length === 0) {
                            $('#emptyState').show();
                            return;
                        }
                        renderOrders(data);
                    },
                    error: function () {
                        $('#pageLoading').hide();
                        showToast('加载失败', 'error');
                    }
                });
            }

            function renderOrders(orders) {
                var $list = $('#ordersList');
                $list.empty();

                $.each(orders, function (i, order) {
                    var statusLabel = statusText[order.status] || order.status;
                    var dateStr = order.createTime ? order.createTime.substring(0, 16).replace('T', ' ') : '';

                    var itemsHtml = '';
                    $.each(order.items, function (j, item) {
                        itemsHtml += ''
                            + '<div class="order-item-row">'
                            + '  <span class="oi-name">' + escapeHtml(item.productName) + '</span>'
                            + '  <span class="oi-qty">×' + item.quantity + '</span>'
                            + '  <span class="oi-sub">¥' + item.subtotal + '</span>'
                            + '</div>';
                    });

                    var cancelBtn = order.status === 'PENDING'
                        ? '<button class="cancel-btn" data-id="' + order.id + '">取消订单</button>'
                        : '';

                    var html = ''
                        + '<div class="order-card">'
                        + '  <div class="order-header">'
                        + '    <div>'
                        + '      <span class="order-id">订单号：' + order.id + '</span>'
                        + '      <span class="order-time" style="margin-left:14px;">' + dateStr + '</span>'
                        + '    </div>'
                        + '    <span class="order-status status-' + order.status + '">' + statusLabel + '</span>'
                        + '  </div>'
                        + '  <div class="order-items">' + itemsHtml + '</div>'
                        + '  <div class="order-footer">'
                        + '    <div class="order-total">合计：<span class="order-total-amount">' + order.totalPrice + '</span></div>'
                        + cancelBtn
                        + '  </div>'
                        + '</div>';

                    $list.append(html);
                });
            }

            // 取消订单
            $('#ordersList').on('click', '.cancel-btn', function () {
                var $btn = $(this);
                var orderId = $btn.data('id');
                if (!confirm('确定取消该订单吗？')) return;

                $.ajax({
                    url: '/api/orders/' + orderId + '/cancel',
                    method: 'POST',
                    dataType: 'json',
                    success: function () {
                        showToast('订单已取消', 'success');
                        loadOrders();
                    },
                    error: function (xhr) {
                        var msg = '取消失败';
                        try { msg = JSON.parse(xhr.responseText).message || msg; } catch(e) {}
                        showToast(msg, 'error');
                    }
                });
            });

            function escapeHtml(text) {
                if (!text) return '';
                var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return text.replace(/[&<>"']/g, function (m) { return map[m]; });
            }

            function showToast(msg, type) {
                var $t = $('<div class="toast ' + (type || 'success') + '">' + msg + '</div>');
                $('body').append($t);
                setTimeout(function() { $t.fadeOut(300, function() { $(this).remove(); }); }, 2000);
            }

            loadOrders();
        });
    </script>
</body>
</html>
