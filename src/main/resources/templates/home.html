<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="home-page">
    <div class="container">
        <h1>🎉 欢迎登录</h1>
        <p class="welcome">恭喜您成功登录系统！</p>

        <div th:if="${param.error != null and param.error[0] == 'forbidden'}" class="message error-message">
            当前账号不是管理员，无法访问用户管理页面。
        </div>

        <div class="user-info">
            <div class="user-info-item">
                <span class="label">用户ID：</span>
                <span class="value" th:text="${user.id}"></span>
            </div>
            <div class="user-info-item">
                <span class="label">用户名：</span>
                <span class="value" th:text="${user.username}"></span>
            </div>
            <div class="user-info-item">
                <span class="label">邮箱：</span>
                <span class="value" th:text="${user.email != null ? user.email : '未设置'}"></span>
            </div>
            <div class="user-info-item">
                <span class="label">注册时间：</span>
                <span class="value" th:text="${user.createTime}"></span>
            </div>
        </div>

        <div class="actions">
            <a th:href="@{/products}">
                <button type="button" class="primary-btn">浏览商品</button>
            </a>
            <a th:href="@{/cart}">
                <button type="button" class="primary-btn">购物车</button>
            </a>
            <a th:if="${userIsAdmin}" th:href="@{/admin/users}">
                <button type="button" class="primary-btn">用户管理</button>
            </a>
            <a th:href="@{/logout}">
                <button type="button" class="primary-btn">退出登录</button>
            </a>
        </div>
    </div>
</body>
</html>
