<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
    <div class="container">
        <h1>修改密码</h1>
        <p class="welcome">请填写注册时使用的邮箱和新密码</p>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input type="email" id="email" name="email" required
                       placeholder="请输入注册时使用的邮箱" autofocus>
                <div class="hint">系统将查找该邮箱关联的账号</div>
            </div>

            <div class="form-group">
                <label for="newPassword">新密码</label>
                <input type="password" id="newPassword" name="newPassword" required
                       placeholder="请输入新密码" minlength="6">
                <div class="hint">密码长度至少6个字符</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认新密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required
                       placeholder="请再次输入新密码" minlength="6">
            </div>

            <button type="submit" class="primary-btn block">确认修改</button>
        </form>

        <div class="register-link">
            想起密码了？<a th:href="@{/login}">返回登录</a>
        </div>
    </div>
</body>
</html>
