<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6fb;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }

        h1 {
            color: #333;
            margin-bottom: 18px;
        }

        .message {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 14px;
            font-size: 14px;
        }

        .success {
            background: #effff1;
            border: 1px solid #bfe7c4;
            color: #2d7a36;
        }

        .error {
            background: #fff0f0;
            border: 1px solid #f1c5c5;
            color: #b53d3d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ececec;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background: #f8f9fb;
            color: #444;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            background: #e8edff;
            color: #3d52b3;
        }

        .btn {
            border: none;
            border-radius: 5px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-danger {
            background: #d84b4b;
            color: white;
        }

        .btn-danger:disabled {
            background: #d5d5d5;
            cursor: not-allowed;
        }

        .toolbar {
            margin-top: 20px;
        }

        .back-link {
            color: #4f63c8;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>管理员 - 用户管理</h1>

    <div th:if="${success}" class="message success" th:text="${success}"></div>
    <div th:if="${error}" class="message error" th:text="${error}"></div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>邮箱</th>
            <th>角色</th>
            <th>注册时间</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email != null ? u.email : '-'}"></td>
            <td>
                <span th:if="${adminUserIds.contains(u.id)}" class="badge">管理员</span>
                <span th:if="${!adminUserIds.contains(u.id)}">普通用户</span>
            </td>
            <td th:text="${u.createTime}"></td>
            <td>
                <form th:action="@{'/admin/users/' + ${u.id} + '/delete'}" method="post"
                      onsubmit="return confirm('确定删除该用户吗？');">
                    <button class="btn btn-danger" type="submit"
                            th:disabled="${u.id == currentUserId}">
                        删除
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="toolbar">
        <a class="back-link" th:href="@{/home}">返回首页</a>
    </div>
</div>
</body>
</html>
