<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link rel="stylesheet" th:href="@{/css/users.css}">
</head>
<body>
<div class="container">
    <h1>管理员 - 用户管理</h1>

    <div th:if="${success}" class="message success" th:text="${success}"></div>
    <div th:if="${error}" class="message error" th:text="${error}"></div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>邮箱</th>
            <th>角色</th>
            <th>注册时间</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email != null ? u.email : '-'}"></td>
            <td>
                <span th:if="${adminUserIds.contains(u.id)}" class="badge">管理员</span>
                <span th:if="${!adminUserIds.contains(u.id)}">普通用户</span>
            </td>
            <td th:text="${u.createTime}"></td>
            <td>
                <form th:action="@{'/admin/users/' + ${u.id} + '/delete'}" method="post"
                      onsubmit="return confirm('确定删除该用户吗？');">
                    <button class="btn btn-danger" type="submit"
                            th:disabled="${u.id == currentUserId}">
                        删除
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="toolbar">
        <a class="back-link" th:href="@{/home}">返回首页</a>
    </div>
</div>
</body>
</html>
