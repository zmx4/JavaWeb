<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body class="auth-page">
    <div class="container">
        <h1>用户注册</h1>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required 
                       placeholder="请输入用户名" minlength="3" maxlength="20" autofocus>
                <div class="hint">用户名长度：3-20个字符</div>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required 
                       placeholder="请输入密码" minlength="6">
                <div class="hint">密码长度至少6个字符</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required 
                       placeholder="请再次输入密码" minlength="6">
            </div>

            <div class="form-group">
                <label for="email">邮箱（选填）</label>
                <input type="email" id="email" name="email" 
                       placeholder="请输入邮箱地址">
            </div>

            <div class="form-group">
                <label>选择角色</label>
                <div class="role-options">
                    <label class="role-option" th:each="r : ${roles}">
                        <input type="radio" name="role" th:value="${r.name()}"
                               th:checked="${r.name() == 'CUSTOMER'}">
                        <span th:text="${r.displayName}">角色</span>
                    </label>
                </div>
                <div class="hint">请选择您的身份角色</div>
            </div>

            <button type="submit" class="primary-btn block">注册</button>
        </form>

        <div class="login-link">
            已有账号？<a th:href="@{/login}">立即登录</a>
        </div>
    </div>
</body>
</html>
