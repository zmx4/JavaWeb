<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 40px;
            width: 420px;
        }
        .register-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #667eea;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 4px;
        }
        .alert-error {
            background: #fee;
            color: #e74c3c;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .link-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }
        .link-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .link-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="register-container">
    <h2>用户注册</h2>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form th:action="@{/user/register}" th:object="${registerRequest}" method="post">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" th:field="*{username}" placeholder="请输入用户名（2-20个字符）"/>
            <div class="error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>

        <div class="form-group">
            <label>邮箱</label>
            <input type="email" th:field="*{email}" placeholder="请输入邮箱（选填）"/>
            <div class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="password" th:field="*{password}" placeholder="请输入密码（6-20个字符）"/>
            <div class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <div class="form-group">
            <label>确认密码</label>
            <input type="password" th:field="*{confirmPassword}" placeholder="请再次输入密码"/>
            <div class="error-msg" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>

        <button type="submit" class="btn">注 册</button>
    </form>

    <div class="link-text">
        已有账号？<a th:href="@{/user/login}">去登录</a>
    </div>
</div>
</body>
</html>
