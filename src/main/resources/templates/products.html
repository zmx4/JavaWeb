<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品浏览</title>
    <link rel="stylesheet" th:href="@{/css/products.css}">
</head>
<body>
    <!-- 顶部导航 -->
    <div class="navbar">
        <h1>商品浏览</h1>
        <div class="navbar-links">
            <a th:href="@{/home}">首页</a>
            <a th:href="@{/cart}" class="cart-link">
                购物车
                <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
            </a>
            <a th:href="@{/logout}">退出登录</a>
        </div>
    </div>

    <div class="main-container">
        <!-- 分类标签栏 -->
        <div class="category-tabs" id="categoryTabs">
            <div class="category-tab active" data-category="">全部分类</div>
            <div class="category-tab" th:each="cat : ${categories}"
                 th:data-category="${cat.id}"
                 th:text="${cat.name}">分类</div>
        </div>

        <!-- 筛选排序栏 -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>排序方式：</label>
                <select id="sortBy">
                    <option value="createTime">按时间</option>
                    <option value="price">按价格</option>
                </select>
            </div>
            <div class="filter-group">
                <label>排序方向：</label>
                <select id="sortOrder">
                    <option value="desc">降序（最新/最高）</option>
                    <option value="asc">升序（最早/最低）</option>
                </select>
            </div>
            <span class="result-count" id="resultCount"></span>
        </div>

        <!-- 商品列表区域 -->
        <div id="productArea">
            <div class="loading" id="loadingIndicator" style="display:none;">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
            <div class="product-grid" id="productGrid"></div>
            <div class="empty-state" id="emptyState" style="display:none;">
                <div class="icon">📦</div>
                <p>暂无商品</p>
            </div>
        </div>
    </div>

    <script th:src="@{/js/jquery-4.0.0.min.js}"></script>
    <script>
        $(function () {
            // 当前筛选状态
            var currentCategory = '';
            var currentSortBy = 'createTime';
            var currentSortOrder = 'desc';

            // 加载商品列表
            function loadProducts() {
                $('#productGrid').hide();
                $('#emptyState').hide();
                $('#loadingIndicator').show();

                var params = {
                    sortBy: currentSortBy,
                    sortOrder: currentSortOrder
                };
                if (currentCategory) {
                    params.categoryId = currentCategory;
                }

                $.ajax({
                    url: '/api/products',
                    method: 'GET',
                    data: params,
                    dataType: 'json',
                    success: function (data) {
                        $('#loadingIndicator').hide();
                        renderProducts(data);
                    },
                    error: function () {
                        $('#loadingIndicator').hide();
                        $('#emptyState').show().find('p').text('加载失败，请刷新重试');
                    }
                });
            }

            // 渲染商品卡片
            function renderProducts(products) {
                var $grid = $('#productGrid');
                $grid.empty();

                $('#resultCount').text('共 ' + products.length + ' 件商品');

                if (products.length === 0) {
                    $('#emptyState').show();
                    return;
                }

                // 商品图标映射（根据分类名称）
                var icons = ['🛍️', '👕', '📱', '💻', '🎮', '📚', '🍔', '⚽', '💄', '🏠'];

                $.each(products, function (i, product) {
                    var icon = icons[i % icons.length];
                    var stockClass = 'stock-info';
                    var stockText = '库存: ' + product.stock;
                    var btnDisabled = false;
                    if (product.stock === 0) {
                        stockClass = 'stock-out';
                        stockText = '已售罄';
                        btnDisabled = true;
                    } else if (product.stock <= 5) {
                        stockClass = 'stock-low';
                        stockText = '仅剩 ' + product.stock + ' 件';
                    }

                    // 格式化时间，只显示日期部分
                    var dateStr = '';
                    if (product.createTime) {
                        dateStr = product.createTime.substring(0, 10);
                    }

                    var desc = product.description || '暂无描述';

                    var btnHtml = btnDisabled
                        ? '<button class="add-cart-btn" disabled>已售罄</button>'
                        : '<button class="add-cart-btn" data-product-id="' + product.id + '">加入购物车</button>';

                    var html = ''
                        + '<div class="product-card">'
                        + '  <div class="product-image">' + icon + '</div>'
                        + '  <div class="product-info">'
                        + '    <div class="product-name">' + escapeHtml(product.name) + '</div>'
                        + '    <div class="product-desc">' + escapeHtml(desc) + '</div>'
                        + '    <div class="product-meta">'
                        + '      <span class="product-price">' + product.price + '</span>'
                        + '      <span class="product-category">' + escapeHtml(product.categoryName) + '</span>'
                        + '    </div>'
                        + '  </div>'
                        + '  <div class="product-footer">'
                        + '    <span>' + dateStr + '</span>'
                        + '    <span class="' + stockClass + '">' + stockText + '</span>'
                        + '  </div>'
                        + '  <div class="product-action">' + btnHtml + '</div>'
                        + '</div>';

                    $grid.append(html);
                });

                $grid.show();
            }

            // HTML转义防止XSS
            function escapeHtml(text) {
                if (!text) return '';
                var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return text.replace(/[&<>"']/g, function (m) { return map[m]; });
            }

            // 分类标签点击事件
            $('#categoryTabs').on('click', '.category-tab', function () {
                $('.category-tab').removeClass('active');
                $(this).addClass('active');
                currentCategory = $(this).data('category');
                loadProducts();
            });

            // 排序方式变更
            $('#sortBy').on('change', function () {
                currentSortBy = $(this).val();
                loadProducts();
            });

            // 排序方向变更
            $('#sortOrder').on('change', function () {
                currentSortOrder = $(this).val();
                loadProducts();
            });

            // 加入购物车
            $('#productGrid').on('click', '.add-cart-btn', function () {
                var $btn = $(this);
                var productId = $btn.data('product-id');
                if (!productId || $btn.prop('disabled')) return;

                $btn.prop('disabled', true).text('添加中...');

                $.ajax({
                    url: '/api/cart/add',
                    method: 'POST',
                    data: { productId: productId, quantity: 1 },
                    dataType: 'json',
                    success: function (res) {
                        $btn.text('已添加 ✓');
                        updateCartBadge(res.cartCount);
                        setTimeout(function () {
                            $btn.prop('disabled', false).text('加入购物车');
                        }, 1200);
                    },
                    error: function (xhr) {
                        var msg = '添加失败';
                        try {
                            msg = JSON.parse(xhr.responseText).message || msg;
                        } catch(e) {}
                        $btn.prop('disabled', false).text('加入购物车');
                        showToast(msg, 'error');
                    }
                });
            });

            // 更新购物车徽标
            function updateCartBadge(count) {
                var $badge = $('#cartBadge');
                if (count > 0) {
                    $badge.text(count).show();
                } else {
                    $badge.hide();
                }
            }

            // 加载购物车数量
            function loadCartCount() {
                $.ajax({
                    url: '/api/cart',
                    method: 'GET',
                    dataType: 'json',
                    success: function (res) {
                        updateCartBadge(res.count);
                    }
                });
            }

            // Toast提示
            function showToast(msg, type) {
                var $toast = $('<div class="toast ' + (type || 'success') + '">' + msg + '</div>');
                $('body').append($toast);
                setTimeout(function () { $toast.fadeOut(300, function() { $(this).remove(); }); }, 2000);
            }

            // 初始加载
            loadProducts();
            loadCartCount();
        });
    </script>
</body>
</html>
